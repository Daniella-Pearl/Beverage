<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRESHSIP BEVERAGES</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <h1>SURVEY/REVIEW</h1>
    <div>
        <form>
            <label for="customerservice">How did you find our customer services?</label>
            <textarea id="message"></textarea>
            <label>Would you recommend your family and friends?</label>
            <label><input type="radio" name="opinion" value="yes"/>YES</label>
            <label><input type="radio" name="opinion" value="no"/>NO</label>
            <label><input type="radio" name="opinion" value="maybe"/>MAYBE</label>
            <label for="opinion">State some of the things you would advise the management to improve or add on.</label>
            <textarea id="opinion"></textarea>
        </form>
        <button type="submit">SUBMIT</button>
    </div>
